<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Aura — Legal</title>
  <style>
    :root { --brand:#C8175E; --ink:#1F1428; --muted:#5C4A5E; --bg:#FBF6F2; --surface:#fff; --border:#eadfe4; }
    body { margin:0; background:var(--bg); color:var(--ink); font:16px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; }
    .wrap { max-width: 560px; margin: 0 auto; padding: 64px 22px; }
    .logo { font-size:32px; font-weight:800; letter-spacing:-0.5px; color:var(--brand); margin-bottom:6px; }
    .sub { color:var(--muted); margin-bottom:32px; }
    a.card { display:flex; align-items:center; justify-content:space-between; text-decoration:none; color:var(--ink);
      background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:20px 22px; margin-bottom:14px; }
    a.card:hover { border-color:var(--brand); }
    .card b { font-size:17px; } .card span { color:var(--muted); font-size:22px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">aura</div>
    <div class="sub">Legal &amp; policies</div>
    <a class="card" href="./privacy.html"><b>Privacy Policy</b><span>→</span></a>
    <a class="card" href="./terms.html"><b>Terms of Service</b><span>→</span></a>
  </div>
</body>
</html>
